<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 100 500 600">
  <defs>
    <symbol id="cube-top">
      <polygon points="0,25 50,0 100,25 50,50"></polygon>
    </symbol>
    <symbol id="cube-left">
      <polygon points="0,25 50,50 50,100 0,75"></polygon>
    </symbol>
    <symbol id="cube-right">
      <polygon points="50,50 100,25 100,75 50,100"></polygon>
    </symbol>
  </defs>

  <g shape-rendering="crispEdges">
    
    <g>
      <use href="#cube-top" x="400" y="450" fill="#29b6f6"></use>
      <use href="#cube-left" x="400" y="450" fill="#0288d1"></use>
      <use href="#cube-right" x="400" y="450" fill="#01579b"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="400" y="400" fill="#4fc3f7"></use>
      <use href="#cube-left" x="400" y="400" fill="#03a9f4"></use>
      <use href="#cube-right" x="400" y="400" fill="#0277bd"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="400" y="350" fill="#4fc3f7"></use>
      <use href="#cube-left" x="400" y="350" fill="#03a9f4"></use>
      <use href="#cube-right" x="400" y="350" fill="#0277bd"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="400" y="300" fill="#81d4fa"></use>
      <use href="#cube-left" x="400" y="300" fill="#29b6f6"></use>
      <use href="#cube-right" x="400" y="300" fill="#0288d1"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="400" y="250" fill="#81d4fa"></use>
      <use href="#cube-left" x="400" y="250" fill="#29b6f6"></use>
      <use href="#cube-right" x="400" y="250" fill="#0288d1"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="400" y="200" fill="#81d4fa"></use>
      <use href="#cube-left" x="400" y="200" fill="#29b6f6"></use>
      <use href="#cube-right" x="400" y="200" fill="#0288d1"></use>
    </g>

    <g>
      <use href="#cube-top" x="350" y="475" fill="#29b6f6"></use>
      <use href="#cube-left" x="350" y="475" fill="#0288d1"></use>
      <use href="#cube-right" x="350" y="475" fill="#01579b"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="300" y="500" fill="#29b6f6"></use>
      <use href="#cube-left" x="300" y="500" fill="#0288d1"></use>
      <use href="#cube-right" x="300" y="500" fill="#01579b"></use>
    </g>

    <g>
      <use href="#cube-top" x="300" y="450" fill="#29b6f6"></use>
      <use href="#cube-left" x="300" y="450" fill="#0288d1"></use>
      <use href="#cube-right" x="300" y="450" fill="#01579b"></use>
    </g>
    
    <g>
      <use href="#cube-top" x="300" y="400" fill="#4fc3f7"></use>
      <use href="#cube-left" x="300" y="400" fill="#03a9f4"></use>
      <use href="#cube-right" x="300" y="400" fill="#0277bd"></use>
    </g>

  </g>
</svg>
